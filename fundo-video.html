<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini DOC</title>
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="js/app.js"></script>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="img/logorf.png" />

  <style>
    .video-wrap { 
      width: min(800px, 80vw); 
      margin: 0 auto; 
    }
    .ratio { 
      position: relative; 
      width: 100%; 
      padding-top: 56.25%; /* proporção 16:9 */
      border: 1px solid var(--matrix); 
      border-radius: 10px; 
      overflow: hidden; 
    }
    .ratio iframe { 
      position: absolute; 
      inset: 0; 
      width: 100%; 
      height: 100%; 
      border: 0; 
    }
  </style>
</head>
<body class="bg" style="background-image:url('img/8-FUNDO-VIDEO.jpg')">
  <main class="page" style="flex-direction:column; gap:22px;">
    <div class="video-wrap">
      <div class="ratio">
        <!-- Embed correto do vídeo -->
        <iframe
          src="https://www.youtube.com/embed/YqsjtXWCpxQ"
          title="Mini DOC"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </div>
    </div>
  </main>

  <nav class="nav">
    <a class="btn" href="gallery.html">Back</a>
    <a class="btn" href="index.html">Home</a>
  </nav>
</body>
</html>
